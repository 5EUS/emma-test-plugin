name: plugin-dev-smoke

on:
  pull_request:
  push:
    branches:
      - main

env:
  EMMA_SDK_VERSION: ${{ vars.EMMA_SDK_VERSION || '0.7.0' }}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Checkout EMMA
        uses: actions/checkout@v4
        with:
          repository: 5EUS/EMMA
          ref: v${{ env.EMMA_SDK_VERSION }}
          path: EMMA

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install WASI SDK
        run: |
          set -euo pipefail
          curl -L https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-25/wasi-sdk-25.0-x86_64-linux.tar.gz -o wasi-sdk.tar.gz
          tar -xzf wasi-sdk.tar.gz
          mv wasi-sdk-25.0-x86_64-linux "$RUNNER_TEMP/wasi-sdk"

      - name: Download prebuilt native WASM runtime bridge
        run: |
          set -euo pipefail

          EMMA_RELEASE_TAG="v${EMMA_SDK_VERSION}"
          EMMA_RELEASE_ASSET="emma-release_${EMMA_RELEASE_TAG}_linux-x64.zip"
          EMMA_RELEASE_URL="https://github.com/5EUS/EMMA/releases/download/${EMMA_RELEASE_TAG}/${EMMA_RELEASE_ASSET}"
          EMMA_RELEASE_DIR="$RUNNER_TEMP/emma-release-linux-x64"
          EMMA_RUNTIME_SOURCE="$EMMA_RELEASE_DIR/linux-x64/wasm-runtime/linux-x64/libemma_wasm_runtime.so"
          EMMA_RUNTIME_DEST_DIR="EMMA/artifacts/wasm-runtime-native/linux-x64"

          rm -rf "$EMMA_RELEASE_DIR" "$RUNNER_TEMP/$EMMA_RELEASE_ASSET"
          mkdir -p "$EMMA_RELEASE_DIR" "$EMMA_RUNTIME_DEST_DIR"

          curl -fsSL "$EMMA_RELEASE_URL" -o "$RUNNER_TEMP/$EMMA_RELEASE_ASSET"
          unzip -q "$RUNNER_TEMP/$EMMA_RELEASE_ASSET" -d "$EMMA_RELEASE_DIR"

          if [[ ! -f "$EMMA_RUNTIME_SOURCE" ]]; then
            echo "Expected prebuilt WASM runtime not found in release asset: $EMMA_RUNTIME_SOURCE" >&2
            exit 1
          fi

          cp "$EMMA_RUNTIME_SOURCE" "$EMMA_RUNTIME_DEST_DIR/libemma_wasm_runtime.so"

      - name: Restore EMMA CLI with EMMA NuGet config
        run: |
          set -euo pipefail
          dotnet restore EMMA/src/EMMA.Cli/EMMA.Cli.csproj --configfile EMMA/nuget.config

      - name: Linux direct smoke
        env:
          EMMA_PLUGIN_DEV_CONFIG: plugin.dev.sample.json
          EMMA_PLUGIN_PROFILE: linux-dev
          UseLocalEmmaSdk: "false"
        run: |
          set -euo pipefail
          dotnet run --project EMMA/src/EMMA.Cli/EMMA.Cli.csproj --no-restore -- build
          dotnet run --project EMMA/src/EMMA.Cli/EMMA.Cli.csproj --no-restore -- scenario paged-smoke naruto
          dotnet run --project EMMA/src/EMMA.Cli/EMMA.Cli.csproj --no-restore -- scenario enriched-rating-smoke naruto
          dotnet run --project EMMA/src/EMMA.Cli/EMMA.Cli.csproj --no-restore -- scenario second-result-metadata-smoke "one piece"

      - name: WASM direct smoke
        env:
          EMMA_PLUGIN_DEV_CONFIG: plugin.dev.sample.json
          EMMA_PLUGIN_PROFILE: wasm-dev
          WASI_SDK_PATH: ${{ runner.temp }}/wasi-sdk
          UseLocalEmmaSdk: "false"
        run: |
          set -euo pipefail
          dotnet run --project EMMA/src/EMMA.Cli/EMMA.Cli.csproj --no-restore -- build
          dotnet run --project EMMA/src/EMMA.Cli/EMMA.Cli.csproj --no-restore -- scenario paged-smoke naruto
          dotnet run --project EMMA/src/EMMA.Cli/EMMA.Cli.csproj --no-restore -- scenario enriched-rating-smoke naruto
          dotnet run --project EMMA/src/EMMA.Cli/EMMA.Cli.csproj --no-restore -- scenario second-result-metadata-smoke "one piece"